{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Product Cards</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f2f5;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .success-message {
            max-width: 600px;
            margin: 0 auto 20px;
            padding: 10px;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            border-radius: 5px;
            text-align: center;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 440px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            overflow: hidden;
        }

        .card .image-box {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .card .image-box img {
            max-height: 100%;
            width: auto;
        }

        .card h3 {
            margin: 10px 0 5px;
        }

        .card p {
            margin: 5px 0;
        }

        button {
            padding: 8px 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: #fff;
            margin: 10% auto;
            padding: 20px;
            width: 300px;
            border-radius: 8px;
            position: relative;
        }

        .close {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    {% if messages %}
      <div class="success-message">
        {% for message in messages %}
          {{ message }}
        {% endfor %}
      </div>
    {% endif %}

    <h2>Available Products</h2>

    <div class="card-grid">
        {% for card in cards %}
        <div class="card">
            <div class="image-box">
                <img src="{{ card.image.url }}" alt="{{ card.title }}">
            </div>
            <h3>{{ card.title }}</h3>
            <p>{{ card.description }}</p>
            <p><strong>Price:</strong> Rs {{ card.price }}</p>
            <button onclick="openModal('{{ card.id }}', '{{ card.title }}')">Order Now</button>
        </div>
        {% endfor %}
    </div>

    <!-- Modal Form -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3 id="modal-title">Order Form</h3>
            <form method="POST" action="{% url 'place_order' %}">
                {% csrf_token %}
                <input type="hidden" name="card_id" id="modal-card-id">
                <input type="text" name="name" placeholder="Your Name" required><br><br>
                <input type="email" name="email" placeholder="Email" required><br><br>
                <input type="text" name="phone" placeholder="Phone" required><br><br>
                <textarea name="address" placeholder="Address" required></textarea><br><br>
                <textarea name="message" placeholder="Message"></textarea><br><br>
                <button type="submit">Submit Order</button>
            </form>
        </div>
    </div>

    <script>
        function openModal(cardId, cardTitle) {
            document.getElementById('orderModal').style.display = 'block';
            document.getElementById('modal-card-id').value = cardId;
            document.getElementById('modal-title').innerText = 'Order: ' + cardTitle;
        }

        function closeModal() {
            document.getElementById('orderModal').style.display = 'none';
        }

        window.onclick = function (event) {
            const modal = document.getElementById('orderModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }
    </script>

</body>
</html>
